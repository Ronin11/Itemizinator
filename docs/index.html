<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate Items</title>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        :root {
            --bg: #fafaf9;
            --card: #ffffff;
            --border: #e7e5e4;
            --text: #1c1917;
            --muted: #78716c;
            --accent: #4f46e5;
            --accent-light: #e0e7ff;
            --claimed: #dcfce7;
            --claimed-border: #86efac;
            --mine: #dbeafe;
            --mine-border: #93c5fd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 { font-size: 1.75rem; font-weight: 600; }
        header p { color: var(--muted); margin-top: 0.25rem; }

        .user-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
        }

        .user-bar .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .user-bar .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }

        .user-bar button {
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--muted);
        }

        .user-bar button:hover { background: #f5f5f4; }

        .sign-in-prompt {
            text-align: center;
            padding: 3rem 1rem;
        }

        .sign-in-prompt p {
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .sign-in-prompt button {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .sign-in-prompt button:hover { opacity: 0.9; }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .controls select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
        }

        .stats {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .item-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }

        .item-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .item-card.claimed {
            background: var(--claimed);
            border-color: var(--claimed-border);
        }

        .item-card.mine {
            background: var(--mine);
            border-color: var(--mine-border);
        }

        .item-card .item-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #f5f5f4;
        }

        .item-card .item-body { padding: 1rem; }

        .item-card .item-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .item-card .item-desc {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .item-card .item-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag-category { background: var(--accent-light); color: var(--accent); }
        .tag-condition { background: #fef3c7; color: #92400e; }

        .item-card .item-claimed {
            font-size: 0.85rem;
            color: #166534;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .claim-btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.35rem 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
        }

        .claim-btn.claim { background: var(--accent); color: white; }
        .claim-btn.claim:hover { opacity: 0.9; }
        .claim-btn.unclaim { background: #fee2e2; color: #991b1b; }
        .claim-btn.unclaim:hover { background: #fecaca; }
        .claim-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .error-msg {
            text-align: center;
            padding: 2rem;
            color: #991b1b;
            background: #fee2e2;
            border-radius: 8px;
        }

        @media (max-width: 640px) {
            body { padding: 1rem 0.5rem; }
            .items-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .controls input[type="text"], .controls select { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1 id="page-title">Estate Items</h1>
        <p>Sign in with Google to browse items and register interest.</p>
    </header>

    <div id="user-bar" class="user-bar" style="display:none"></div>
    <div id="app"></div>

    <script src="config.js"></script>
    <script>
        const app = document.getElementById("app");
        const userBar = document.getElementById("user-bar");

        // Auth state
        let currentUser = null;
        let accessToken = null;
        let tokenClient = null;
        let allItems = [];
        let sheetId = null;

        // ---- Google Identity Services ----

        function initAuth() {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleIdToken,
                auto_select: true,
            });

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: "https://www.googleapis.com/auth/spreadsheets",
                callback: handleAccessToken,
            });

            // Show sign-in prompt
            showSignInPrompt();
        }

        function handleIdToken(response) {
            const payload = JSON.parse(atob(response.credential.split(".")[1]));
            currentUser = {
                email: payload.email,
                name: payload.name,
                picture: payload.picture,
            };
            renderUserBar();
            // Now request an access token to read/write the sheet
            if (!accessToken) {
                app.innerHTML = '<div class="loading">Authorizing...</div>';
                requestAccessToken();
            }
        }

        function handleAccessToken(response) {
            if (response.error) {
                console.error("Token error:", response);
                app.innerHTML = '<div class="error-msg">Authorization failed. Please try signing in again.</div>';
                return;
            }
            accessToken = response.access_token;

            // If there was a pending claim, execute it
            if (pendingClaim) {
                const { rowIndex, shouldClaim } = pendingClaim;
                pendingClaim = null;
                executeClaimWrite(rowIndex, shouldClaim);
                return;
            }

            // Otherwise, load data
            loadData();
        }

        function signIn() {
            google.accounts.id.prompt((notification) => {
                // If prompt was dismissed or skipped, fall back to token client
                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                    requestAccessToken();
                }
            });
        }

        function signOut() {
            currentUser = null;
            accessToken = null;
            allItems = [];
            google.accounts.id.disableAutoSelect();
            renderUserBar();
            showSignInPrompt();
        }

        function requestAccessToken() {
            tokenClient.requestAccessToken();
        }

        function showSignInPrompt() {
            app.innerHTML = `
                <div class="sign-in-prompt">
                    <p>Sign in with your Google account to browse items and register interest.</p>
                    <button onclick="signIn()">Sign in with Google</button>
                </div>
            `;
        }

        function renderUserBar() {
            if (!currentUser) {
                userBar.style.display = "none";
                return;
            }
            userBar.style.display = "flex";
            userBar.innerHTML = `
                <div class="user-info">
                    ${currentUser.picture ? `<img class="user-avatar" src="${escapeHtml(currentUser.picture)}" alt="">` : ""}
                    <span>${escapeHtml(currentUser.email)}</span>
                </div>
                <button onclick="signOut()">Sign out</button>
            `;
        }

        // ---- Data fetching via Sheets API ----

        function getSheetId() {
            const params = new URLSearchParams(window.location.search);
            if (params.get("sheet")) return params.get("sheet");
            if (typeof SHEET_ID !== "undefined" && SHEET_ID) return SHEET_ID;
            return null;
        }

        function getSheetName() {
            if (typeof SHEET_NAME !== "undefined" && SHEET_NAME) return SHEET_NAME;
            return null;
        }

        async function fetchSheetData(id) {
            const resp = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Sheet1?majorDimension=ROWS`,
                { headers: { "Authorization": `Bearer ${accessToken}` } }
            );

            if (resp.status === 401) {
                accessToken = null;
                requestAccessToken();
                return [];
            }

            if (resp.status === 403) {
                throw new Error("You don't have access to this spreadsheet. Ask the organizer to share it with your Google account.");
            }

            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.error?.message || resp.statusText);
            }

            const data = await resp.json();
            const rows = data.values || [];
            if (rows.length < 2) return [];

            const headers = rows[0];
            return rows.slice(1).map((row, idx) => {
                const obj = {};
                headers.forEach((h, i) => { obj[h] = row[i] || ""; });
                obj._rowIndex = idx + 2;
                return obj;
            });
        }

        async function loadData() {
            app.innerHTML = '<div class="loading">Loading items...</div>';

            try {
                allItems = await fetchSheetData(sheetId);
                if (allItems.length === 0) {
                    app.innerHTML = '<div class="loading">No items found yet. Run the processing script first.</div>';
                    return;
                }
                renderItems(allItems);
            } catch (err) {
                app.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
            }
        }

        // ---- Claiming ----

        let pendingClaim = null;

        async function claimItem(rowIndex, shouldClaim) {
            if (!accessToken) {
                pendingClaim = { rowIndex, shouldClaim };
                requestAccessToken();
                return;
            }
            await executeClaimWrite(rowIndex, shouldClaim);
        }

        async function executeClaimWrite(rowIndex, shouldClaim) {
            const email = shouldClaim ? currentUser.email : "";
            const range = `Sheet1!F${rowIndex}`;

            try {
                const resp = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?valueInputOption=RAW`,
                    {
                        method: "PUT",
                        headers: {
                            "Authorization": `Bearer ${accessToken}`,
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ values: [[email]] }),
                    }
                );

                if (resp.status === 401) {
                    accessToken = null;
                    pendingClaim = { rowIndex, shouldClaim };
                    requestAccessToken();
                    return;
                }

                if (resp.status === 403) {
                    alert("You don't have access to register interest. Ask the organizer to share the spreadsheet with your Google account.");
                    return;
                }

                if (!resp.ok) {
                    const err = await resp.json();
                    alert(`Failed to update: ${err.error?.message || resp.statusText}`);
                    return;
                }

                const item = allItems.find(i => i._rowIndex === rowIndex);
                if (item) item["Claimed By"] = email;
                renderCurrentView();

            } catch (err) {
                alert(`Error claiming item: ${err.message}`);
            }
        }

        // ---- Rendering ----

        let currentFilters = { query: "", category: "", claimStatus: "" };

        function renderCurrentView() {
            if (allItems.length === 0) return;
            renderItems(allItems);
        }

        function renderItems(items) {
            const categories = [...new Set(items.map(i => i.Category))].sort();
            const totalClaimed = items.filter(i => i["Claimed By"]).length;

            let html = `
                <div class="controls">
                    <input type="text" id="search" placeholder="Search items..." value="${escapeHtml(currentFilters.query)}">
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        ${categories.map(c => `<option value="${escapeHtml(c)}" ${currentFilters.category === c ? "selected" : ""}>${escapeHtml(c)}</option>`).join("")}
                    </select>
                    <select id="claim-filter">
                        <option value="" ${currentFilters.claimStatus === "" ? "selected" : ""}>All Items</option>
                        <option value="unclaimed" ${currentFilters.claimStatus === "unclaimed" ? "selected" : ""}>Available</option>
                        <option value="claimed" ${currentFilters.claimStatus === "claimed" ? "selected" : ""}>Interest Registered</option>
                        <option value="mine" ${currentFilters.claimStatus === "mine" ? "selected" : ""}>My Interests</option>
                    </select>
                </div>
                <div class="stats" id="stats">
                    ${items.length} items total &middot; ${totalClaimed} interest registered &middot; ${items.length - totalClaimed} available
                </div>
                <div id="items-container"></div>
            `;

            app.innerHTML = html;

            const container = document.getElementById("items-container");
            const searchInput = document.getElementById("search");
            const categoryFilter = document.getElementById("category-filter");
            const claimFilter = document.getElementById("claim-filter");
            const stats = document.getElementById("stats");

            function filterAndRender() {
                currentFilters.query = searchInput.value;
                currentFilters.category = categoryFilter.value;
                currentFilters.claimStatus = claimFilter.value;

                const query = currentFilters.query.toLowerCase();

                let filtered = items.filter(item => {
                    if (currentFilters.category && item.Category !== currentFilters.category) return false;
                    if (currentFilters.claimStatus === "claimed" && !item["Claimed By"]) return false;
                    if (currentFilters.claimStatus === "unclaimed" && item["Claimed By"]) return false;
                    if (currentFilters.claimStatus === "mine" && item["Claimed By"] !== currentUser?.email) return false;
                    if (query) {
                        const searchable = `${item.Item} ${item.Description} ${item.Category} ${item["Claimed By"]}`.toLowerCase();
                        if (!searchable.includes(query)) return false;
                    }
                    return true;
                });

                const claimed = filtered.filter(i => i["Claimed By"]).length;
                stats.textContent = `Showing ${filtered.length} of ${items.length} items \u00b7 ${claimed} interest registered \u00b7 ${filtered.length - claimed} available`;

                container.innerHTML = `
                    <div class="items-grid">
                        ${filtered.map(item => {
                            const isMine = currentUser && item["Claimed By"] === currentUser.email;
                            const isClaimed = !!item["Claimed By"];
                            const cardClass = isMine ? "mine" : (isClaimed ? "claimed" : "");

                            let claimButton = "";
                            if (!isClaimed) {
                                claimButton = `<button class="claim-btn claim" onclick="claimItem(${item._rowIndex}, true)">I'm Interested</button>`;
                            } else if (isMine) {
                                claimButton = `<button class="claim-btn unclaim" onclick="claimItem(${item._rowIndex}, false)">Remove Interest</button>`;
                            }

                            const photoUrl = item.Photo || item["Photo Link"] || "";

                            return `
                                <div class="item-card ${cardClass}">
                                    ${photoUrl ? `<img class="item-photo" src="${escapeHtml(photoUrl)}=w400" alt="${escapeHtml(item.Item)}" loading="lazy">` : ""}
                                    <div class="item-body">
                                        <div class="item-name">${escapeHtml(item.Item)}</div>
                                        <div class="item-desc">${escapeHtml(item.Description)}</div>
                                        <div class="item-meta">
                                            <span class="tag tag-category">${escapeHtml(item.Category)}</span>
                                            ${item.Condition ? `<span class="tag tag-condition">${escapeHtml(item.Condition)}</span>` : ""}
                                        </div>
                                        ${isClaimed ? `<div class="item-claimed">${isMine ? "You're interested" : `${escapeHtml(item["Claimed By"])} is interested`}</div>` : ""}
                                        ${item.Notes ? `<div class="item-desc" style="margin-top:0.25rem"><em>${escapeHtml(item.Notes)}</em></div>` : ""}
                                        ${claimButton}
                                    </div>
                                </div>
                            `;
                        }).join("")}
                    </div>`;
            }

            searchInput.addEventListener("input", filterAndRender);
            categoryFilter.addEventListener("change", filterAndRender);
            claimFilter.addEventListener("change", filterAndRender);

            filterAndRender();
        }

        function escapeHtml(str) {
            if (!str) return "";
            const div = document.createElement("div");
            div.textContent = String(str);
            return div.innerHTML;
        }

        // ---- Init ----

        async function init() {
            sheetId = getSheetId();

            if (!sheetId) {
                app.innerHTML = '<div class="loading">No spreadsheet configured. Set SHEET_ID in config.js.</div>';
                return;
            }

            const name = getSheetName();
            if (name) document.getElementById("page-title").textContent = name;

            // Wait for GSI library and init auth
            if (GOOGLE_CLIENT_ID) {
                const waitForGoogle = () => new Promise(resolve => {
                    if (typeof google !== "undefined" && google.accounts) return resolve();
                    const check = setInterval(() => {
                        if (typeof google !== "undefined" && google.accounts) {
                            clearInterval(check);
                            resolve();
                        }
                    }, 100);
                });
                await waitForGoogle();
                initAuth();
            } else {
                app.innerHTML = '<div class="loading">No Google Client ID configured. Set GOOGLE_CLIENT_ID in config.js.</div>';
            }
        }

        init();
    </script>
</body>
</html>
