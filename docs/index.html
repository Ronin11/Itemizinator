<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate Items</title>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
        :root {
            --bg: #fafaf9;
            --card: #ffffff;
            --border: #e7e5e4;
            --text: #1c1917;
            --muted: #78716c;
            --accent: #4f46e5;
            --accent-light: #e0e7ff;
            --interested: #dcfce7;
            --interested-border: #86efac;
            --mine: #dbeafe;
            --mine-border: #93c5fd;
            --contested: #fef3c7;
            --contested-border: #fcd34d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        header { text-align: center; margin-bottom: 1rem; }
        header h1 { font-size: 1.75rem; font-weight: 600; }
        header p { color: var(--muted); margin-top: 0.25rem; }

        /* Nav tabs */
        .nav-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
        }

        .nav-tab {
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s, border-color 0.15s;
        }

        .nav-tab:hover { color: var(--text); }
        .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .nav-tab .tab-badge {
            display: inline-block;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 99px;
            margin-left: 0.35rem;
        }

        .nav-tab .tab-badge.warn {
            background: var(--contested);
            color: #92400e;
        }

        .user-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
        }

        .user-bar .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .user-bar .user-avatar { width: 28px; height: 28px; border-radius: 50%; }

        .user-bar button {
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--muted);
        }

        .user-bar button:hover { background: #f5f5f4; }

        .sign-in-prompt { text-align: center; padding: 3rem 1rem; }
        .sign-in-prompt p { color: var(--muted); margin-bottom: 1rem; }
        .sign-in-prompt button {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .sign-in-prompt button:hover { opacity: 0.9; }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .controls select {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
        }

        .stats { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }

        .section-heading {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.5rem 0 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .section-heading:first-child { margin-top: 0; }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .item-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }

        .item-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .item-card.interested {
            background: var(--interested);
            border-color: var(--interested-border);
        }

        .item-card.mine {
            background: var(--mine);
            border-color: var(--mine-border);
        }

        .item-card.contested {
            background: var(--contested);
            border-color: var(--contested-border);
        }

        .item-card .item-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #f5f5f4;
        }

        .item-card .item-body { padding: 1rem; }

        .item-card .item-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }

        .item-card .item-desc { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.5rem; }

        .item-card .item-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag-category { background: var(--accent-light); color: var(--accent); }
        .tag-condition { background: #fef3c7; color: #92400e; }
        .tag-contested { background: #fee2e2; color: #991b1b; }
        .tag-count { background: var(--contested); color: #92400e; }
        .tag-location { background: #f3f4f6; color: #374151; }

        .item-card .item-interested {
            font-size: 0.85rem;
            color: #166534;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .item-card .interested-list {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }

        .claim-btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.35rem 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
        }

        .claim-btn.claim { background: var(--accent); color: white; }
        .claim-btn.claim:hover { opacity: 0.9; }
        .claim-btn.unclaim { background: #fee2e2; color: #991b1b; }
        .claim-btn.unclaim:hover { background: #fecaca; }

        .loading { text-align: center; padding: 3rem; color: var(--muted); }
        .error-msg { text-align: center; padding: 2rem; color: #991b1b; background: #fee2e2; border-radius: 8px; }
        .empty-state { text-align: center; padding: 2rem; color: var(--muted); }

        @media (max-width: 640px) {
            body { padding: 1rem 0.5rem; }
            .items-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .controls input[type="text"], .controls select { width: 100%; }
            .nav-tabs { overflow-x: auto; }
            .nav-tab { white-space: nowrap; font-size: 0.8rem; padding: 0.5rem 0.75rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1 id="page-title">Estate Items</h1>
        <p>Sign in with Google to browse items and register interest.</p>
    </header>

    <div id="user-bar" class="user-bar" style="display:none"></div>
    <div id="app"></div>

    <script src="config.js"></script>
    <script>
        const app = document.getElementById("app");
        const userBar = document.getElementById("user-bar");

        let currentUser = null;
        let accessToken = null;
        let tokenClient = null;
        let allItems = [];
        let sheetId = null;
        let currentPage = "browse"; // browse | my-items | contested

        // ---- Helpers for multi-interest "Claimed By" (comma-separated emails) ----

        function getInterestedList(item) {
            const val = (item["Claimed By"] || "").trim();
            if (!val) return [];
            return val.split(",").map(e => e.trim()).filter(Boolean);
        }

        function isInterested(item) {
            return getInterestedList(item).includes(currentUser?.email);
        }

        function interestCount(item) {
            return getInterestedList(item).length;
        }

        function isContested(item) {
            return interestCount(item) > 1;
        }

        // ---- Google Identity Services ----

        function initAuth() {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleIdToken,
                auto_select: true,
            });

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: "https://www.googleapis.com/auth/spreadsheets",
                callback: handleAccessToken,
            });

            showSignInPrompt();
        }

        function handleIdToken(response) {
            const payload = JSON.parse(atob(response.credential.split(".")[1]));
            currentUser = {
                email: payload.email,
                name: payload.name,
                picture: payload.picture,
            };
            renderUserBar();
            if (!accessToken) {
                app.innerHTML = '<div class="loading">Authorizing...</div>';
                requestAccessToken();
            }
        }

        function handleAccessToken(response) {
            if (response.error) {
                console.error("Token error:", response);
                app.innerHTML = '<div class="error-msg">Authorization failed. Please try signing in again.</div>';
                return;
            }
            accessToken = response.access_token;

            if (pendingInterest) {
                const p = pendingInterest;
                pendingInterest = null;
                executeInterestWrite(p.rowIndex, p.add);
                return;
            }

            loadData();
        }

        function signIn() {
            google.accounts.id.prompt((notification) => {
                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                    requestAccessToken();
                }
            });
        }

        function signOut() {
            currentUser = null;
            accessToken = null;
            allItems = [];
            currentPage = "browse";
            google.accounts.id.disableAutoSelect();
            renderUserBar();
            showSignInPrompt();
        }

        function requestAccessToken() {
            tokenClient.requestAccessToken();
        }

        function showSignInPrompt() {
            app.innerHTML = `
                <div class="sign-in-prompt">
                    <p>Sign in with your Google account to browse items and register interest.</p>
                    <button onclick="signIn()">Sign in with Google</button>
                </div>
            `;
        }

        function renderUserBar() {
            if (!currentUser) { userBar.style.display = "none"; return; }
            userBar.style.display = "flex";
            userBar.innerHTML = `
                <div class="user-info">
                    ${currentUser.picture ? `<img class="user-avatar" src="${escapeHtml(currentUser.picture)}" alt="">` : ""}
                    <span>${escapeHtml(currentUser.email)}</span>
                </div>
                <button onclick="signOut()">Sign out</button>
            `;
        }

        // ---- Data fetching ----

        function getSheetId() {
            const params = new URLSearchParams(window.location.search);
            if (params.get("sheet")) return params.get("sheet");
            if (typeof SHEET_ID !== "undefined" && SHEET_ID) return SHEET_ID;
            return null;
        }

        function getSheetName() {
            if (typeof SHEET_NAME !== "undefined" && SHEET_NAME) return SHEET_NAME;
            return null;
        }

        async function fetchSheetData(id) {
            const resp = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Sheet1?majorDimension=ROWS`,
                { headers: { "Authorization": `Bearer ${accessToken}` } }
            );

            if (resp.status === 401) { accessToken = null; requestAccessToken(); return []; }
            if (resp.status === 403) throw new Error("You don't have access to this spreadsheet. Ask the organizer to share it with your Google account.");
            if (!resp.ok) { const err = await resp.json(); throw new Error(err.error?.message || resp.statusText); }

            const data = await resp.json();
            const rows = data.values || [];
            if (rows.length < 2) return [];

            const headers = rows[0];
            return rows.slice(1).map((row, idx) => {
                const obj = {};
                headers.forEach((h, i) => { obj[h] = row[i] || ""; });
                obj._rowIndex = idx + 2;
                return obj;
            });
        }

        async function loadData() {
            app.innerHTML = '<div class="loading">Loading items...</div>';
            try {
                allItems = await fetchSheetData(sheetId);
                if (allItems.length === 0) {
                    app.innerHTML = '<div class="loading">No items found yet.</div>';
                    return;
                }
                renderPage();
            } catch (err) {
                app.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
            }
        }

        // ---- Interest (multi-person) ----

        let pendingInterest = null;

        async function toggleInterest(rowIndex) {
            const item = allItems.find(i => i._rowIndex === rowIndex);
            if (!item) return;
            const interested = isInterested(item);

            if (!accessToken) {
                pendingInterest = { rowIndex, add: !interested };
                requestAccessToken();
                return;
            }
            await executeInterestWrite(rowIndex, !interested);
        }

        async function executeInterestWrite(rowIndex, add) {
            const item = allItems.find(i => i._rowIndex === rowIndex);
            if (!item) return;

            let list = getInterestedList(item);
            if (add) {
                if (!list.includes(currentUser.email)) list.push(currentUser.email);
            } else {
                list = list.filter(e => e !== currentUser.email);
            }
            const newValue = list.join(", ");
            const range = `Sheet1!G${rowIndex}`;

            try {
                const resp = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?valueInputOption=RAW`,
                    {
                        method: "PUT",
                        headers: { "Authorization": `Bearer ${accessToken}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ values: [[newValue]] }),
                    }
                );

                if (resp.status === 401) {
                    accessToken = null;
                    pendingInterest = { rowIndex, add };
                    requestAccessToken();
                    return;
                }
                if (resp.status === 403) {
                    alert("You don't have access to register interest. Ask the organizer to share the spreadsheet with your Google account.");
                    return;
                }
                if (!resp.ok) { const err = await resp.json(); alert(`Failed: ${err.error?.message || resp.statusText}`); return; }

                item["Claimed By"] = newValue;
                renderPage();
            } catch (err) {
                alert(`Error: ${err.message}`);
            }
        }

        // ---- Navigation ----

        function switchPage(page) {
            currentPage = page;
            renderPage();
        }

        function renderNav() {
            const myCount = allItems.filter(i => isInterested(i)).length;
            const contestedCount = allItems.filter(i => isContested(i)).length;

            return `
                <div class="nav-tabs">
                    <button class="nav-tab ${currentPage === 'browse' ? 'active' : ''}" onclick="switchPage('browse')">All Items</button>
                    <button class="nav-tab ${currentPage === 'my-items' ? 'active' : ''}" onclick="switchPage('my-items')">
                        My Items${myCount ? `<span class="tab-badge">${myCount}</span>` : ""}
                    </button>
                    <button class="nav-tab ${currentPage === 'contested' ? 'active' : ''}" onclick="switchPage('contested')">
                        Contested${contestedCount ? `<span class="tab-badge warn">${contestedCount}</span>` : ""}
                    </button>
                </div>
            `;
        }

        // ---- Rendering ----

        function renderPage() {
            if (allItems.length === 0) return;
            if (currentPage === "my-items") renderMyItems();
            else if (currentPage === "contested") renderContested();
            else renderBrowse();
        }

        // -- Card rendering helper --

        function renderCard(item, opts = {}) {
            const list = getInterestedList(item);
            const iMine = isInterested(item);
            const count = list.length;
            const contested = count > 1;
            const photoUrl = item.Photo || item["Photo Link"] || "";

            let cardClass = "";
            if (opts.contestedHighlight && contested) cardClass = "contested";
            else if (iMine) cardClass = "mine";
            else if (count > 0) cardClass = "interested";

            let button = "";
            if (iMine) {
                button = `<button class="claim-btn unclaim" onclick="toggleInterest(${item._rowIndex})">Remove Interest</button>`;
            } else {
                button = `<button class="claim-btn claim" onclick="toggleInterest(${item._rowIndex})">I'm Interested</button>`;
            }

            let interestInfo = "";
            if (count > 0) {
                if (opts.showAllNames) {
                    interestInfo = `<div class="item-interested">${count} interested</div>
                        <div class="interested-list">${list.map(e => escapeHtml(e)).join(", ")}</div>`;
                } else if (iMine && count === 1) {
                    interestInfo = `<div class="item-interested">You're interested</div>`;
                } else if (iMine) {
                    interestInfo = `<div class="item-interested">You + ${count - 1} other${count > 2 ? "s" : ""} interested</div>`;
                } else {
                    interestInfo = `<div class="item-interested">${count} person${count > 1 ? "s" : ""} interested</div>`;
                }
            }

            return `
                <div class="item-card ${cardClass}">
                    ${photoUrl ? `<img class="item-photo" src="${escapeHtml(photoUrl)}=w400" alt="${escapeHtml(item.Item)}" loading="lazy">` : ""}
                    <div class="item-body">
                        <div class="item-name">${escapeHtml(item.Item)}</div>
                        <div class="item-desc">${escapeHtml(item.Description)}</div>
                        <div class="item-meta">
                            ${item.Location ? `<span class="tag tag-location">${escapeHtml(item.Location)}</span>` : ""}
                            <span class="tag tag-category">${escapeHtml(item.Category)}</span>
                            ${item.Condition ? `<span class="tag tag-condition">${escapeHtml(item.Condition)}</span>` : ""}
                            ${contested ? `<span class="tag tag-contested">${count} interested</span>` : ""}
                        </div>
                        ${interestInfo}
                        ${item.Notes ? `<div class="item-desc" style="margin-top:0.25rem"><em>${escapeHtml(item.Notes)}</em></div>` : ""}
                        ${button}
                    </div>
                </div>
            `;
        }

        // -- Browse page --

        let browseFilters = { query: "", category: "", location: "" };

        function renderBrowse() {
            const categories = [...new Set(allItems.map(i => i.Category).filter(Boolean))].sort();
            const locations = [...new Set(allItems.map(i => i.Location).filter(Boolean))].sort();

            app.innerHTML = `
                ${renderNav()}
                <div class="controls">
                    <input type="text" id="search" placeholder="Search items..." value="${escapeHtml(browseFilters.query)}">
                    ${locations.length > 0 ? `
                    <select id="location-filter">
                        <option value="">All Locations</option>
                        ${locations.map(l => `<option value="${escapeHtml(l)}" ${browseFilters.location === l ? "selected" : ""}>${escapeHtml(l)}</option>`).join("")}
                    </select>` : ""}
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        ${categories.map(c => `<option value="${escapeHtml(c)}" ${browseFilters.category === c ? "selected" : ""}>${escapeHtml(c)}</option>`).join("")}
                    </select>
                </div>
                <div class="stats" id="stats"></div>
                <div id="items-container"></div>
            `;

            const container = document.getElementById("items-container");
            const searchInput = document.getElementById("search");
            const categoryFilter = document.getElementById("category-filter");
            const locationFilter = document.getElementById("location-filter");
            const stats = document.getElementById("stats");

            function render() {
                browseFilters.query = searchInput.value;
                browseFilters.category = categoryFilter.value;
                browseFilters.location = locationFilter ? locationFilter.value : "";
                const query = browseFilters.query.toLowerCase();

                let filtered = allItems.filter(item => {
                    if (browseFilters.category && item.Category !== browseFilters.category) return false;
                    if (browseFilters.location && item.Location !== browseFilters.location) return false;
                    if (query) {
                        const s = `${item.Item} ${item.Description} ${item.Category} ${item.Location || ""}`.toLowerCase();
                        if (!s.includes(query)) return false;
                    }
                    return true;
                });

                const ic = filtered.filter(i => interestCount(i) > 0).length;
                stats.textContent = `${filtered.length} items \u00b7 ${ic} with interest \u00b7 ${filtered.length - ic} available`;

                container.innerHTML = `<div class="items-grid">${filtered.map(i => renderCard(i, { contestedHighlight: true })).join("")}</div>`;
            }

            searchInput.addEventListener("input", render);
            categoryFilter.addEventListener("change", render);
            if (locationFilter) locationFilter.addEventListener("change", render);
            render();
        }

        // -- My Items page --

        function renderMyItems() {
            const myItems = allItems.filter(i => isInterested(i));
            const uncontested = myItems.filter(i => !isContested(i));
            const contested = myItems.filter(i => isContested(i));

            let content = renderNav();

            if (myItems.length === 0) {
                content += `<div class="empty-state">You haven't registered interest in any items yet. Browse items to get started.</div>`;
            } else {
                content += `<div class="stats">${myItems.length} item${myItems.length !== 1 ? "s" : ""} you're interested in \u00b7 ${contested.length} contested</div>`;

                if (uncontested.length > 0) {
                    content += `<h2 class="section-heading">Uncontested (${uncontested.length})</h2>`;
                    content += `<div class="items-grid">${uncontested.map(i => renderCard(i)).join("")}</div>`;
                }

                if (contested.length > 0) {
                    content += `<h2 class="section-heading">Contested (${contested.length})</h2>`;
                    content += `<div class="items-grid">${contested.map(i => renderCard(i, { contestedHighlight: true, showAllNames: true })).join("")}</div>`;
                }
            }

            app.innerHTML = content;
        }

        // -- Contested page --

        function renderContested() {
            const contested = allItems
                .filter(i => isContested(i))
                .sort((a, b) => interestCount(b) - interestCount(a));

            let content = renderNav();

            if (contested.length === 0) {
                content += `<div class="empty-state">No contested items. Everyone's getting along!</div>`;
            } else {
                content += `<div class="stats">${contested.length} item${contested.length !== 1 ? "s" : ""} with multiple people interested</div>`;
                content += `<div class="items-grid">${contested.map(i => renderCard(i, { contestedHighlight: true, showAllNames: true })).join("")}</div>`;
            }

            app.innerHTML = content;
        }

        // ---- Utils ----

        function escapeHtml(str) {
            if (!str) return "";
            const div = document.createElement("div");
            div.textContent = String(str);
            return div.innerHTML;
        }

        // ---- Init ----

        async function init() {
            sheetId = getSheetId();

            if (!sheetId) {
                app.innerHTML = '<div class="loading">No spreadsheet configured. Set SHEET_ID in config.js.</div>';
                return;
            }

            const name = getSheetName();
            if (name) document.getElementById("page-title").textContent = name;

            if (GOOGLE_CLIENT_ID) {
                const waitForGoogle = () => new Promise(resolve => {
                    if (typeof google !== "undefined" && google.accounts) return resolve();
                    const check = setInterval(() => {
                        if (typeof google !== "undefined" && google.accounts) {
                            clearInterval(check);
                            resolve();
                        }
                    }, 100);
                });
                await waitForGoogle();
                initAuth();
            } else {
                app.innerHTML = '<div class="loading">No Google Client ID configured. Set GOOGLE_CLIENT_ID in config.js.</div>';
            }
        }

        init();
    </script>
</body>
</html>
